<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Household Budget</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f3ebdd; --paper-2:#efe5d3; --card:#fbf6ec; --ink:#26201b; --ink-soft:#6b6357;
    --line:rgba(38,32,27,.12); --line-strong:rgba(38,32,27,.22); --dot:rgba(38,32,27,.035);
    --rust:#bf4e2e; --green:#3f7d63; --blue:#5566b0; --gold:#c98a1e; --red:#c0392b; --done:#9a917f;
    --shadow:0 1px 0 rgba(38,32,27,.04), 0 16px 44px -26px rgba(38,32,27,.5);
  }
  [data-theme="dark"]{
    --paper:#1f1a15; --paper-2:#272018; --card:#2d251c; --ink:#f1e8d7; --ink-soft:#a99f8d;
    --line:rgba(241,232,215,.12); --line-strong:rgba(241,232,215,.22); --dot:rgba(241,232,215,.045);
    --rust:#e07a52; --green:#5fae87; --blue:#8d9ae0; --gold:#e0ab4a; --red:#e36b59; --done:#7d7567;
    --shadow:0 1px 0 rgba(0,0,0,.2), 0 18px 46px -24px rgba(0,0,0,.8);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    transition:background-color .4s ease,color .4s ease}
  body{min-height:100vh;padding:24px 16px 64px;background-image:radial-gradient(var(--dot) 1px,transparent 1px);background-size:22px 22px}
  .wrap{max-width:760px;margin:0 auto}
  .mono{font-family:"JetBrains Mono",monospace;font-variant-numeric:tabular-nums}
  .card,.tile,.inc,.head,.sav,.shop,.btn.ghost{transition:background-color .4s ease,color .4s ease,border-color .4s ease,box-shadow .15s,transform .15s}
 
  .masthead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;border-bottom:2px solid var(--ink);padding-bottom:14px;flex-wrap:wrap}
  .eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--rust);font-weight:700}
  h1{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(30px,6.5vw,48px);line-height:.94;letter-spacing:-.02em;margin-top:2px}
  .toprow{display:flex;align-items:center;gap:8px}
  .monthnav{display:flex;align-items:center;gap:8px}
  .monthnav .lbl{font-family:"Fraunces",serif;font-size:16px;font-weight:600;min-width:104px;text-align:center}
  .navbtn{width:36px;height:36px;border:1.5px solid var(--ink);background:transparent;border-radius:50%;cursor:pointer;font-size:16px;display:grid;place-items:center;transition:.15s;color:var(--ink);flex:none}
  .navbtn:hover{background:var(--ink);color:var(--paper)}
  .theme{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--line-strong);background:var(--card);cursor:pointer;font-size:17px;display:grid;place-items:center;flex:none}
  .syncpill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--ink-soft);background:var(--card);border:1.5px solid var(--line-strong);border-radius:20px;padding:5px 11px;flex:none;white-space:nowrap}
  .syncpill .syncdot{width:8px;height:8px;border-radius:50%;background:var(--done);transition:background .3s}
  .signout{border:1.5px solid var(--line-strong);background:var(--card);color:var(--ink-soft);border-radius:20px;padding:5px 11px;font:inherit;font-weight:700;font-size:11px;cursor:pointer;flex:none;white-space:nowrap;transition:.15s}
  .signout:hover{border-color:var(--ink);color:var(--ink)}
  .loginGate{position:fixed;inset:0;z-index:100;background:var(--paper);background-image:radial-gradient(var(--dot) 1px,transparent 1px);background-size:22px 22px;display:flex;align-items:center;justify-content:center;padding:24px}
  .loginCard{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:30px 26px;box-shadow:var(--shadow)}
  .loginCard .lg-eyebrow{font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--rust);font-weight:700}
  .loginCard .lg-title{font-family:"Fraunces",serif;font-weight:900;font-size:42px;line-height:.95;letter-spacing:-.02em;margin:2px 0 4px}
  .loginCard .lg-sub{font-size:13px;color:var(--ink-soft);font-weight:600;margin-bottom:18px}
  .loginCard .lg-lab{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--ink-soft);margin:12px 0 5px}
  .loginCard .lg-in{width:100%;border:1.5px solid var(--line-strong);background:var(--paper);border-radius:11px;padding:13px 14px;font:inherit;font-size:16px;color:var(--ink)}
  .loginCard .lg-in:focus{outline:none;border-color:var(--ink)}
  .loginCard .lg-err{color:var(--red);font-size:12.5px;font-weight:700;min-height:16px;margin-top:10px}
  .loginCard .lg-btn{margin-top:6px;width:100%;background:var(--ink);color:var(--paper);border:none;border-radius:12px;padding:15px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:.15s}
  .loginCard .lg-btn:hover{background:var(--rust)} .loginCard .lg-btn:disabled{opacity:.6;cursor:default}
  .syncpill.ok .syncdot{background:var(--green)} .syncpill.ok{color:var(--green)}
  .syncpill.saving .syncdot{background:var(--gold);animation:syncblink 1s infinite} .syncpill.saving{color:var(--gold)}
  .syncpill.off .syncdot{background:var(--red)} .syncpill.off{color:var(--red)}
  @keyframes syncblink{50%{opacity:.3}}
  .theme:hover{border-color:var(--ink)} .theme:active{transform:rotate(40deg)}
 
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;box-shadow:var(--shadow);animation:pop .4s ease backwards}
  @keyframes pop{from{opacity:0;transform:scale(.94) translateY(6px)}}
  .tile .t-lab{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .tile .t-val{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(17px,4.3vw,25px);margin-top:6px;line-height:1;letter-spacing:-.01em}
  .tile.balance{background:var(--ink);color:#f5ecdc} .tile.balance .t-val{color:#f5ecdc} .tile.balance .t-lab{color:rgba(245,236,220,.6)}
  [data-theme="dark"] .tile.balance{background:#0f0c09}
  .tile.income .t-val{color:var(--green)} .tile.spent .t-val{color:var(--rust)} .tile.saved .t-val{color:var(--blue)}
 
  .accts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:18px}
  @media(min-width:620px){.accts{grid-template-columns:repeat(4,1fr)}}
  .acctsum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
  .acct{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;box-shadow:var(--shadow);animation:pop .4s ease backwards;transition:background-color .4s ease,border-color .4s ease,box-shadow .15s,transform .15s}
  .acct .a-lab{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .acct .a-val{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:clamp(15px,4.1vw,21px);margin-top:5px;letter-spacing:-.01em;line-height:1}
  .acct.total{background:var(--ink);color:#f5ecdc} .acct.total .a-val{color:#f5ecdc} .acct.total .a-lab{color:rgba(245,236,220,.6)}
  [data-theme="dark"] .acct.total{background:#0f0c09}
  .acct.neg .a-val{color:var(--red)}
  .calc-disp{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:30px;text-align:right;background:var(--card);border:1.5px solid var(--line-strong);border-radius:12px;padding:16px 14px;margin-bottom:12px;overflow-x:auto;white-space:nowrap;color:var(--ink)}
  .calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .ck{border:1.5px solid var(--line-strong);background:var(--card);color:var(--ink);border-radius:12px;padding:16px 0;font:inherit;font-weight:700;font-size:18px;cursor:pointer;font-family:"JetBrains Mono",monospace;transition:.12s}
  .ck:hover{border-color:var(--ink)} .ck:active{transform:scale(.95)}
  .ck.op{color:var(--rust)} .ck.fn{color:var(--ink-soft)} .ck.eq{background:var(--ink);color:#f5ecdc;border-color:var(--ink)} .ck.eq:hover{background:var(--rust)}
 
  .actions{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap}
  .btn{border:none;border-radius:12px;padding:14px 18px;font:inherit;font-weight:700;font-size:14.5px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
  .btn.primary{background:var(--ink);color:var(--paper);flex:1;min-width:150px} .btn.primary:hover{background:var(--rust)} .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line-strong)} .btn.ghost:hover{border-color:var(--ink)}
 
  .sec-h{display:flex;align-items:center;justify-content:space-between;margin:26px 2px 10px;border-bottom:1.5px solid var(--line-strong);padding-bottom:6px;gap:10px}
  .sec-h h2{font-family:"Fraunces",serif;font-size:20px;font-weight:600}
  .sec-h .note{font-size:12px;color:var(--ink-soft);font-weight:600;white-space:nowrap}
  .sec-h .mini{border:1.5px solid var(--line-strong);background:var(--card);border-radius:9px;padding:6px 11px;font:inherit;font-weight:700;font-size:12.5px;cursor:pointer;color:var(--ink)}
  .sec-h .mini:hover{border-color:var(--ink)}
 
  .inc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .inc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;box-shadow:var(--shadow);animation:rise .35s ease backwards}
  .inc:hover{border-color:var(--ink);transform:translateY(-2px)}
  .inc .who{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px}
  .inc .who .pin{width:9px;height:9px;border-radius:50%;background:var(--green)} .inc .who .pin.pending{background:var(--gold)}
  .inc .amt{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:22px;margin-top:8px}
  .inc .sub{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:3px}
  .inc .tag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:6px;display:inline-block;padding:3px 8px;border-radius:20px}
  .inc .tag.in{background:rgba(63,125,99,.16);color:var(--green)} .inc .tag.due{background:rgba(201,138,30,.18);color:var(--gold)}
 
  .head{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);animation:rise .3s ease backwards}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}}
  .head .top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .head .nm{font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:8px}
  .head .nm .fx{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);border:1px solid var(--line-strong);border-radius:5px;padding:1px 5px;font-weight:700}
  .head .figs{font-family:"JetBrains Mono",monospace;font-size:13.5px;color:var(--ink-soft);white-space:nowrap} .head .figs b{color:var(--ink);font-weight:700}
  .track{height:8px;background:var(--paper-2);border:1px solid var(--line);border-radius:20px;overflow:hidden;margin-top:9px}
  .track u{display:block;height:100%;width:0;border-radius:20px;transition:width .7s cubic-bezier(.22,1,.36,1)}
  .head .rem{font-size:11.5px;font-weight:600;margin-top:6px;color:var(--ink-soft)} .head .rem.over{color:var(--red)}
  .head.clickable{cursor:pointer} .head.clickable:hover{border-color:var(--ink)}
 
  .sav{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);animation:rise .3s ease backwards}
  .sav:hover{border-color:var(--ink)}
  .sav .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .sav .nm{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px}
  .sav .figs{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ink-soft)} .sav .figs b{color:var(--blue)}
  .sav .track u{background:var(--blue)}
  .sav .badge{font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--green);background:rgba(63,125,99,.16);padding:3px 8px;border-radius:20px}
 
  /* lending */
  .loan{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);animation:rise .3s ease backwards}
  .loan:hover{border-color:var(--ink)}
  .loan .info{flex:1;min-width:0}
  .loan .nm{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .loan .sub{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:2px}
  .loan .amt{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:16px;white-space:nowrap;text-align:right}
  .loan .amt b{color:var(--gold)} .loan .amt small{display:block;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;margin-top:2px}
  .loan.settled{opacity:.62} .loan.settled .nm{text-decoration:line-through}
  .loan .badge{font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--green);background:rgba(63,125,99,.16);padding:3px 8px;border-radius:20px}
  .loan .del{border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:14px;opacity:.4;transition:.15s;padding:3px;border-radius:6px}
  .loan .del:hover{opacity:1;color:var(--rust);background:rgba(191,78,46,.1)}
  .modal .tabs{display:flex;gap:8px;margin-bottom:4px}
  .modal .tabs button{flex:1;border:1.5px solid var(--line-strong);background:var(--card);color:var(--ink-soft);border-radius:11px;padding:11px;font:inherit;font-weight:700;font-size:13.5px;cursor:pointer;transition:.15s}
  .modal .tabs button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
 
  /* shopping */
  .chips{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
  .chip{border:1.5px solid var(--line-strong);background:var(--card);border-radius:20px;padding:7px 13px;font:inherit;font-weight:700;font-size:12.5px;cursor:pointer;color:var(--ink-soft)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .shop{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:7px;box-shadow:var(--shadow);animation:rise .25s ease backwards}
  .shop .box{width:23px;height:23px;border:2px solid var(--line-strong);border-radius:7px;flex:none;cursor:pointer;display:grid;place-items:center;transition:.15s}
  .shop .box svg{width:13px;height:13px;stroke:#fff;stroke-width:3.4;fill:none;opacity:0;transform:scale(.4);transition:.18s}
  .shop.done .box{background:var(--green);border-color:var(--green)} .shop.done .box svg{opacity:1;transform:scale(1)}
  .shop .info{flex:1;min-width:0} .shop .nm{font-weight:600;font-size:15px} .shop.done .nm{text-decoration:line-through;color:var(--done)}
  .shop .meta{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:1px;display:flex;gap:8px;flex-wrap:wrap}
  .shop .meta .lt{display:inline-flex;align-items:center;gap:4px}
  .shop .price{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:14px;white-space:nowrap}
  .shop .del{border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:14px;opacity:.4;transition:.15s;padding:3px;border-radius:6px}
  .shop .del:hover{opacity:1;color:var(--rust);background:rgba(191,78,46,.1)}
 
  /* tx — no dates */
  .tx{display:grid;grid-template-columns:30px 1fr auto 26px;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line);animation:rise .25s ease backwards}
  .tx .dot{width:11px;height:11px;border-radius:3px;justify-self:center}
  .tx .desc .note{font-weight:600;font-size:14.5px} .tx .desc .ct{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:1px}
  .tx .val{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:15px;text-align:right}
  .tx .del{border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:14px;opacity:0;transition:.15s;border-radius:6px;padding:3px}
  .tx:hover .del{opacity:.5} .tx .del:hover{opacity:1;color:var(--rust);background:rgba(191,78,46,.1)}
  .tx .ct .badges{display:inline-flex;flex-wrap:wrap;gap:6px;margin-left:8px;vertical-align:middle}
  .tx .ct .txstat{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:20px;cursor:pointer;transition:.15s;user-select:none}
  .tx .ct .txstat.ok{background:rgba(63,125,99,.16);color:var(--green)}
  .tx .ct .txstat.done{background:rgba(63,125,99,.16);color:var(--green)}
  .tx .ct .txstat.todo{background:transparent;color:var(--ink-soft);border:1px solid var(--line-strong)}
  .tx .ct .txstat.norefund{background:transparent;color:var(--ink-soft);border:1px dashed var(--line-strong)}
  .tx .ct .txstat.part{background:rgba(201,138,30,.18);color:var(--gold)}
  .tx .ct .txstat.refund{background:rgba(192,57,43,.16);color:var(--red)}
  .tx .ct .txstat:active{transform:scale(.92)}
  .tx.cleared{background:rgba(63,125,99,.05)}
  .tx.refunded .note{text-decoration:line-through;color:var(--done)}
  .tx.refunded .val{text-decoration:line-through;color:var(--done)}
  .tx.refunded .dot{opacity:.4}
  .tx .val .net{display:block;color:var(--gold)}
  .tx .val .gross{display:block;font-size:11px;color:var(--ink-soft);font-weight:600}
  .empty{text-align:center;color:var(--ink-soft);padding:24px 10px;font-size:14.5px}
  .empty span{font-family:"Fraunces",serif;font-style:italic;font-size:18px;color:var(--ink);display:block;margin-bottom:3px}
 
  .overlay{position:fixed;inset:0;background:rgba(20,16,12,.55);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .overlay.open{display:flex;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}}
  .modal{position:relative;background:var(--paper);width:100%;max-width:460px;border-radius:22px 22px 0 0;padding:22px 20px 26px;box-shadow:0 -10px 40px rgba(0,0,0,.3);animation:slideup .28s cubic-bezier(.22,1,.36,1);max-height:92vh;overflow:auto}
  @media(min-width:560px){.overlay{align-items:center}.modal{border-radius:22px}}
  @keyframes slideup{from{transform:translateY(60px);opacity:.5}}
  .modal h3{font-family:"Fraunces",serif;font-size:23px;font-weight:600;margin-bottom:14px}
  .modal label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--ink-soft);margin:12px 0 5px}
  .modal input,.modal select{width:100%;border:1.5px solid var(--line-strong);background:var(--card);border-radius:11px;padding:13px 14px;font:inherit;font-size:16px;color:var(--ink)}
  .modal input:focus,.modal select:focus{outline:none;border-color:var(--ink)}
  .modal .amt-wrap{position:relative} .modal .amt-wrap .cur{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-soft);font-family:"JetBrains Mono",monospace;pointer-events:none}
  .modal .amt-wrap input{padding-left:30px;font-family:"JetBrains Mono",monospace;font-weight:600}
  .modal .row2{display:flex;gap:10px}.modal .row2>*{flex:1}
  .modal .save{margin-top:20px;width:100%;background:var(--ink);color:var(--paper);border:none;border-radius:12px;padding:15px;font-weight:700;font-size:15px;cursor:pointer;transition:.15s}.modal .save:hover{background:var(--rust)}
  .modal .quick{margin-top:8px;width:100%;background:rgba(63,125,99,.14);color:var(--green);border:1.5px solid rgba(63,125,99,.3);border-radius:11px;padding:12px;font-weight:700;font-size:14px;cursor:pointer}
  .modal .cfg-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}.modal .cfg-row span{flex:1;font-weight:600;font-size:14px}.modal .cfg-row input{width:120px;flex:none;text-align:right;font-family:"JetBrains Mono",monospace}
  .modal .grp{font-family:"Fraunces",serif;font-size:15px;font-weight:600;margin:16px 0 8px;color:var(--rust)}

const hasStore=typeof window!=="undefined"&&window.storage; let mem=null;

let state=null, shopFilter="all";
let view=new Date(); view.setDate(1); view.setHours(0,0,0,0);
const mk=()=>view.getFullYear()+"-"+String(view.getMonth()+1).padStart(2,"0");
 
function ensureMonth(){
  const k=mk();
  if(!state.months[k]){const inc={},sav={};state.config.people.forEach(p=>inc[p.id]=0);state.config.savings.forEach(s=>sav[s.id]=0);state.months[k]={income:inc,savings:sav,tx:[],transfers:[]};}
  const m=state.months[k];
  if(!m.transfers)m.transfers=[];
  state.config.people.forEach(p=>{if(m.income[p.id]==null)m.income[p.id]=0;});
  state.config.savings.forEach(s=>{if(m.savings[s.id]==null)m.savings[s.id]=0;});
  return m;
}
/* Refund handling. t.refund = amount refunded back (0 = complete, == amount = full refund,
   anything between = partial). Old data used t.status==="refunded" for a full refund. */
function refundOf(t){const r=t.refund!=null?t.refund:(t.status==="refunded"?t.amount:0);return Math.max(0,Math.min(r,t.amount));}
function netOf(t){return Math.max(0,Math.round((t.amount-refundOf(t))*100)/100);}
function txState(t){const r=refundOf(t);if(r<=0.001)return "complete";if(r>=t.amount-0.001)return "full";return "partial";}
/* Routing a refund: the refunded amount is added into the account you choose.
   We track what was already applied so re-editing or deleting cleanly reverses it. */
function setAccountBalance(accId,delta){const a=(state.accounts||[]).find(x=>x.id===accId);if(a)a.balance=Math.round(((a.balance||0)+delta)*100)/100;}
function applyRefundRouting(t,newRefund,newAcct){
  if(t.refundApplied){setAccountBalance(t.refundAcctApplied,-t.refundApplied);}
  if(newRefund>0&&newAcct){setAccountBalance(newAcct,newRefund);t.refundApplied=newRefund;t.refundAcctApplied=newAcct;}
  else{t.refundApplied=0;t.refundAcctApplied=null;}
  t.refund=newRefund;t.refundAccount=(newRefund>0?newAcct:null);
}
function reverseRefundRouting(t){if(t&&t.refundApplied){setAccountBalance(t.refundAcctApplied,-t.refundApplied);t.refundApplied=0;t.refundAcctApplied=null;}}
/* Auto-adjust account balances as money moves. Each entry remembers what it applied
   so deleting it cleanly reverses. Balances stay directly editable by tapping a tile. */
function applyExpenseToAccount(t){if(t&&t.account){setAccountBalance(t.account,-t.amount);t.acctApplied=t.account;}}
function reverseExpenseFromAccount(t){if(t&&t.acctApplied){setAccountBalance(t.acctApplied,t.amount);t.acctApplied=null;}}
function applyTransfer(tr){setAccountBalance(tr.from,-tr.amount);setAccountBalance(tr.to,tr.amount);tr.applied=true;}
function reverseTransfer(tr){if(tr&&tr.applied){setAccountBalance(tr.from,tr.amount);setAccountBalance(tr.to,-tr.amount);tr.applied=false;}}
function applyLoan(L){if(L&&L.account){setAccountBalance(L.account,-L.amount);L.acctApplied=L.account;L.amtApplied=L.amount;}}
function reverseLoan(L){if(!L)return;if(L.acctApplied){setAccountBalance(L.acctApplied,(L.amtApplied!=null?L.amtApplied:L.amount));L.acctApplied=null;}(L.repayments||[]).forEach(r=>{if(r.applied){setAccountBalance(r.account,-r.amount);r.applied=false;}});}
function applyRepayment(r){if(r&&r.account){setAccountBalance(r.account,r.amount);r.applied=true;}}
function calc(){
  const m=ensureMonth();
  const inAct=state.config.people.reduce((s,p)=>s+(m.income[p.id]||0),0);
  const spentByHead={}; state.config.heads.forEach(h=>spentByHead[h.id]=0);
  m.tx.forEach(t=>{spentByHead[t.head]=(spentByHead[t.head]||0)+netOf(t);});
  const spent=m.tx.reduce((s,t)=>s+netOf(t),0);
  const saved=state.config.savings.reduce((s,g)=>s+(m.savings[g.id]||0),0);
  const budget=state.config.heads.reduce((s,h)=>s+(h.budget||0),0);
  return {m,inAct,spentByHead,spent,saved,budget,budgetLeft:budget-spent,balance:inAct-spent-saved};
}
const acctName=id=>{const a=(state.accounts||[]).find(x=>x.id===id);return a?a.name:"";};
const MAYKEY="2026-05";
function mkNext(k){const [y,mo]=k.split("-").map(Number);const d=new Date(y,mo,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function aibAccountForPerson(pid){const p=state.config.people.find(x=>x.id===pid);if(!p)return null;const a=state.accounts.find(x=>x.bank==="AIB"&&x.owner===p.name);return a?a.id:null;}
function postedInMonth(accId,k,includeIncome){let v=0;const m=state.months[k];
  if(m){
    if(includeIncome)state.config.people.forEach(p=>{if(aibAccountForPerson(p.id)===accId)v+=(m.income[p.id]||0);});
    (m.tx||[]).forEach(t=>{if(t.account===accId)v-=t.amount;});
    (m.transfers||[]).forEach(tr=>{if(tr.from===accId)v-=tr.amount;if(tr.to===accId)v+=tr.amount;});
  }
  (state.loans||[]).forEach(L=>{
    if(L.createdMonth===k&&L.account===accId)v-=L.amount;
    (L.repayments||[]).forEach(r=>{if(r.month===k&&r.account===accId)v+=r.amount;});
  });
  return v;}
// May is the starting point: the salaries you entered are already inside the balances you gave, so income is NOT re-added in May — but expenses and transfers you log still reduce the accounts. June onward also adds each salary into the matching AIB and carries the previous month forward.
function accountBalanceAt(accId,target){
  const base=(state.baseline&&state.baseline[accId]!=null)?state.baseline[accId]:0;
  if(target<MAYKEY)return Math.round(base*100)/100;
  let bal=base+postedInMonth(accId,MAYKEY,false);
  let k=MAYKEY,guard=0;
  while(k<target&&guard<600){k=mkNext(k);bal+=postedInMonth(accId,k,true);guard++;}
  return Math.round(bal*100)/100;}
/* Manual account balances: the four account tiles are now plain, directly-typed figures.
   Whatever you enter is shown exactly — no salary, expense, transfer or loan formula touches them. */
function acctBal(a){return a&&a.balance!=null?a.balance:0;}
function migrateToManualBalances(){
  if(!Array.isArray(state.accounts))return;
  if(state.accountsManual){state.accounts.forEach(a=>{if(a.balance==null)a.balance=0;});return;}
  state.accounts.forEach(a=>{if(a.balance==null)a.balance=accountBalanceAt(a.id,"2026-05");});
  state.accountsManual=true;
}
 
/* count-up */
function animNum(el,to){
  const from=parseFloat(el.dataset.v||"0"); el.dataset.v=to;
  if(Math.abs(from-to)<0.005){el.textContent=eur(to);return;}
  const t0=performance.now(),dur=700;
  (function step(now){let p=Math.min(1,(now-t0)/dur);p=1-Math.pow(1-p,3);el.textContent=eur(from+(to-from)*p);if(p<1)requestAnimationFrame(step);})(t0);
}
function fillBars(){requestAnimationFrame(()=>document.querySelectorAll("u[data-w]").forEach(u=>u.style.width=u.dataset.w+"%"));}
 
/* render */
function render(){
  const {m,inAct,spentByHead,spent,saved,budgetLeft}=calc();
  const curK=mk();
  const accBal={}; state.accounts.forEach(a=>accBal[a.id]=acctBal(a));
  const acctTot=state.accounts.reduce((s,a)=>s+accBal[a.id],0);

  animNum(document.getElementById("tSpent"),spent);
  animNum(document.getElementById("tSaved"),saved);
  animNum(document.getElementById("tBal"),budgetLeft);
 
  const accEl=document.getElementById("accts"); accEl.innerHTML="";
  state.accounts.forEach((a,i)=>{const bal=accBal[a.id],low=bal<0;
    const c=document.createElement("div");c.className="acct"+(low?" neg":"");c.dataset.aid=a.id;c.style.cursor="pointer";c.style.animationDelay=(i*.03)+"s";
    c.innerHTML=`<div class="a-lab">${esc(a.name)}</div><div class="a-val">${eur(bal)}</div>`;
    accEl.appendChild(c);});
  const aibTot=state.accounts.filter(a=>a.bank==="AIB").reduce((s,a)=>s+accBal[a.id],0);
  const revTot=state.accounts.filter(a=>a.bank==="Revolut").reduce((s,a)=>s+accBal[a.id],0);
  document.getElementById("acctsum").innerHTML=
    `<div class="acct${aibTot<0?' neg':''}"><div class="a-lab">All AIB</div><div class="a-val">${eur(aibTot)}</div></div>`+
    `<div class="acct${revTot<0?' neg':''}"><div class="a-lab">All Revolut</div><div class="a-val">${eur(revTot)}</div></div>`+
    `<div class="acct total"><div class="a-lab">Total available</div><div class="a-val">${eur(acctTot)}</div></div>`;
 
  const incEl=document.getElementById("income"); incEl.innerHTML=""; let incExp=0;
  state.config.people.forEach((p,i)=>{incExp+=p.income;const got=m.income[p.id]||0,paid=got>0;
    const c=document.createElement("div");c.className="inc";c.dataset.pid=p.id;c.style.animationDelay=(i*.05)+"s";
    c.innerHTML=`<div class="who"><span class="pin ${paid?'':'pending'}"></span>${esc(p.name)}</div><div class="amt">${eur(got)}</div><div class="sub">expected ${eur(p.income)}</div><span class="tag ${paid?'in':'due'}">${paid?'Received':'Tap when received'}</span>`;
    incEl.appendChild(c);});
  document.getElementById("incNote").textContent=eur(inAct)+" of "+eur(incExp);
 
  const headsEl=document.getElementById("heads");headsEl.innerHTML="";let budgetTot=0;
  state.config.heads.forEach((h,i)=>{budgetTot+=h.budget;const sp=spentByHead[h.id]||0,rem=h.budget-sp;
    const pct=h.budget>0?Math.min(100,Math.round(sp/h.budget*100)):0,over=sp>h.budget+0.001,col=colorFor(h.id);
    const row=document.createElement("div");row.className="head clickable";row.dataset.head=h.id;row.style.animationDelay=(i*.03)+"s";
    row.innerHTML=`<div class="top"><div class="nm"><span style="width:11px;height:11px;border-radius:3px;background:${col};display:inline-block"></span>${esc(h.name)}${h.fixed?'<span class="fx">fixed</span>':''}</div><div class="figs"><b>${eur(sp)}</b> / ${eur(h.budget)}</div></div>
      <div class="track"><u data-w="${pct}" style="background:${over?'var(--red)':col}"></u></div>
      <div class="rem ${over?'over':''}">${over?('Over by '+eur(sp-h.budget)):(eur(rem)+' left')}</div>`;
    headsEl.appendChild(row);});
  document.getElementById("expNote").textContent=eur(spent)+" of "+eur(budgetTot);
 
  const savEl=document.getElementById("savings");savEl.innerHTML="";let goalTot=0;
  state.config.savings.forEach((g,i)=>{goalTot+=g.goal;const sv=m.savings[g.id]||0,pct=g.goal>0?Math.min(100,Math.round(sv/g.goal*100)):0,full=sv>=g.goal-0.001&&g.goal>0;
    const c=document.createElement("div");c.className="sav";c.dataset.sid=g.id;c.style.animationDelay=(i*.04)+"s";
    c.innerHTML=`<div class="top"><div class="nm">${esc(g.name)} ${full?'<span class="badge">✓ Transferred</span>':''}</div><div class="figs"><b>${eur(sv)}</b> / ${eur(g.goal)}</div></div><div class="track"><u data-w="${pct}"></u></div>`;
    savEl.appendChild(c);});
  document.getElementById("savNote").textContent=eur(saved)+" of "+eur(goalTot);
 
  renderLoans();
  renderShopping();
 
  const list=document.getElementById("txlist");
  const txs=[...m.tx].sort((a,b)=>(b.seq||0)-(a.seq||0));
  const trs=[...(m.transfers||[])].sort((a,b)=>(b.seq||0)-(a.seq||0));
  document.getElementById("txNote").textContent=txs.length?txs.length+" entries":"";
  if(!txs.length&&!trs.length)list.innerHTML='<div class="empty"><span>No expenses logged yet.</span>Tap “Add expense” to start.</div>';
  else{list.innerHTML="";
    trs.forEach((t,i)=>{const row=document.createElement("div");row.className="tx";row.style.animationDelay=(i*.02)+"s";
      row.innerHTML=`<span class="dot" style="background:var(--blue)"></span><div class="desc"><div class="note">Transfer</div><div class="ct">${esc(acctName(t.from))} → ${esc(acctName(t.to))}</div></div><div class="val">${eur(t.amount)}</div><button class="del" data-tdel="${t.id}" aria-label="Delete">✕</button>`;
      list.appendChild(row);});
    txs.forEach((t,i)=>{const h=state.config.heads.find(x=>x.id===t.head)||{name:"Other"};const lbl=t.note||(t.sub||h.name);
    const ts=txState(t),back=refundOf(t),net=netOf(t),done=!!t.cleared;
    const row=document.createElement("div");row.className="tx"+(ts==="full"?" refunded":"")+(ts==="partial"?" partial":"")+(done?" cleared":"");row.style.animationDelay=(i*.02)+"s";
    const doneBadge=`<span class="txstat ${done?'done':'todo'}" data-txdone="${t.id}" title="Mark complete from your end">${done?'✓ Done':'○ Mark done'}</span>`;
    const refBadge=ts==="full"
      ? `<span class="txstat refund" data-txstat="${t.id}" title="Tap to edit refund">↩ Refunded${t.refundAccount?(' → '+esc(acctName(t.refundAccount))):''}</span>`
      : ts==="partial"
        ? `<span class="txstat part" data-txstat="${t.id}" title="Tap to edit refund">↩ ${eur(back)} back${t.refundAccount?(' → '+esc(acctName(t.refundAccount))):''}</span>`
        : `<span class="txstat norefund" data-txstat="${t.id}" title="Tap to add a refund">↩ Refund?</span>`;
    const valHtml=ts==="partial"

function calcModal(){let expr="";
  openModal(`<h3>Calculator</h3>
    <div id="calcDisp" class="calc-disp">0</div>
    <div class="calc-grid" id="calcGrid">
      <button class="ck fn" data-k="C">C</button><button class="ck fn" data-k="back">⌫</button><button class="ck fn" data-k="%">%</button><button class="ck op" data-k="/">÷</button>
      <button class="ck" data-k="7">7</button><button class="ck" data-k="8">8</button><button class="ck" data-k="9">9</button><button class="ck op" data-k="*">×</button>
      <button class="ck" data-k="4">4</button><button class="ck" data-k="5">5</button><button class="ck" data-k="6">6</button><button class="ck op" data-k="-">−</button>
      <button class="ck" data-k="1">1</button><button class="ck" data-k="2">2</button><button class="ck" data-k="3">3</button><button class="ck op" data-k="+">+</button>
      <button class="ck" data-k="0">0</button><button class="ck" data-k=".">.</button><button class="ck eq" data-k="=" style="grid-column:span 2">=</button>
    </div>`);
  const disp=document.getElementById("calcDisp");
  const show=()=>{disp.textContent=expr===""?"0":expr;};
  const isOp=c=>"+-*/".includes(c);
  function evalExpr(s){const toks=s.match(/(\d+\.?\d*)|[+\-*/]/g);if(!toks)return 0;
    let stack=[parseFloat(toks[0])||0];
    for(let j=1;j<toks.length;j+=2){const op=toks[j],num=parseFloat(toks[j+1]);if(num==null||isNaN(num))break;
      if(op==='*')stack.push(stack.pop()*num);else if(op==='/')stack.push(stack.pop()/num);
      else if(op==='+')stack.push(num);else if(op==='-')stack.push(-num);}
    return stack.reduce((x,y)=>x+y,0);}
  const fmt=v=>{if(!isFinite(v))return "Error";return String(Math.round(v*1e6)/1e6);};
  document.getElementById("calcGrid").addEventListener("click",e=>{const b=e.target.closest("[data-k]");if(!b)return;const k=b.dataset.k;
    if(k==="C"){expr="";}
    else if(k==="back"){expr=expr.slice(0,-1);}
    else if(k==="%"){expr=fmt(evalExpr(expr||"0")/100);if(expr==="Error")expr="";}
    else if(k==="="){expr=fmt(evalExpr(expr||"0"));if(expr==="Error"){show();expr="";return;}}
    else if(isOp(k)){if(expr===""){if(k==="-")expr="-";}else if(isOp(expr.slice(-1))){expr=expr.slice(0,-1)+k;}else expr+=k;}
    else if(k==="."){const tail=expr.split(/[+\-*/]/).pop();if(!tail.includes("."))expr+=(tail===""?"0.":".");}
    else{expr+=k;}
    show();});}

  const heads=state.config.heads.map(h=>`<div class="cfg-row"><span>${esc(h.name)}</span><input data-bud="${h.id}" type="number" step="0.01" value="${h.budget}"></div>`).join("");
  const sav=state.config.savings.map(g=>`<div class="cfg-row"><span>${esc(g.name)}</span><input data-goal="${g.id}" type="number" step="0.01" value="${g.goal}"></div>`).join("");
  openModal(`<h3>Monthly budgets</h3><div class="grp">Expected income</div>${inc}<div class="grp">Budget per category</div>${heads}
    <div class="grp">Add a category</div><div class="row2"><input id="newName" type="text" placeholder="Name"><input id="newBud" type="number" step="0.01" placeholder="Budget"></div>
    <div class="grp">Savings goals</div>${sav}<button class="save" id="mSave">Save budgets</button>`);
  document.getElementById("mSave").onclick=async()=>{modal.querySelectorAll("[data-inc]").forEach(i=>{state.config.people.find(x=>x.id===i.dataset.inc).income=parseFloat(i.value)||0;});
    modal.querySelectorAll("[data-bud]").forEach(i=>{state.config.heads.find(x=>x.id===i.dataset.bud).budget=parseFloat(i.value)||0;});
    modal.querySelectorAll("[data-goal]").forEach(i=>{state.config.savings.find(x=>x.id===i.dataset.goal).goal=parseFloat(i.value)||0;});
    const nn=document.getElementById("newName").value.trim(),nb=parseFloat(document.getElementById("newBud").value);
    if(nn&&nb>0)state.config.heads.push({id:"c"+Date.now(),name:nn,budget:Math.round(nb*100)/100});
    await save();closeModal();render();};}
 
/* excel */
function buildRows(){const {m,inAct,spentByHead,spent,saved,balance}=calc();const mLabel=MONF[view.getMonth()]+" "+view.getFullYear();
  const rows=[["MONTHLY EXPENSES TRACKER (€) — "+mLabel],[],["Category","Projected","Actual","Remaining"],["INCOME","","",""]];let incExp=0;
  state.config.people.forEach(p=>{rows.push([p.name+" – Income",p.income,m.income[p.id]||0,""]);incExp+=p.income;});
  rows.push(["Total Income",incExp,inAct,""],[],["EXPENSES","","",""]);let budTot=0;
  state.config.heads.forEach(h=>{const sp=spentByHead[h.id]||0;rows.push([h.name,h.budget,sp,h.budget-sp]);budTot+=h.budget;});
  rows.push(["Total Expenses",budTot,spent,budTot-spent],[],["SAVINGS","","",""]);let goalTot=0;
  state.config.savings.forEach(g=>{const sv=m.savings[g.id]||0;rows.push([g.name,g.goal,sv,g.goal-sv]);goalTot+=g.goal;});
  rows.push(["Total Savings",goalTot,saved,goalTot-saved],[],["ACCOUNTS","","",""]);let acctTot=0;const ck=mk();
  state.accounts.forEach(a=>{const b=acctBal(a);rows.push([a.name,"",b,""]);acctTot+=b;});
  rows.push(["Total in accounts","",acctTot,""]);
  const openL=(state.loans||[]).map(L=>{const r=(L.repayments||[]).reduce((s,x)=>s+x.amount,0);return {person:L.person,origin:L.origin,total:L.amount,repaid:Math.round(r*100)/100,out:Math.round((L.amount-r)*100)/100};});
  if(openL.length){rows.push([],["MONEY OWED TO YOU","Total","Repaid","Outstanding"]);let owed=0;
    openL.forEach(L=>{rows.push([L.person+(L.origin==='split'?' (split)':''),L.total,L.repaid,L.out]);owed+=L.out;});
    rows.push(["Total outstanding","","",Math.round(owed*100)/100]);}
  rows.push([],["Bank Balance","",acctTot,""]);return rows;}
function exportReport(){const rows=buildRows(),name="Budget_"+MON[view.getMonth()]+"_"+view.getFullYear();
  if(typeof XLSX!=="undefined"){const ws=XLSX.utils.aoa_to_sheet(rows);ws["!cols"]=[{wch:28},{wch:13},{wch:13},{wch:13}];const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,MON[view.getMonth()]+" "+view.getFullYear());XLSX.writeFile(wb,name+".xlsx");}

document.addEventListener("pointerdown",e=>{
  const t=e.target.closest(".btn,.navbtn,.theme,.chip,.mini,.inc,.head.clickable,.sav,.box,.save,.quick");
  if(!t)return;
  const r=t.getBoundingClientRect();
  if(getComputedStyle(t).position==="static")t.style.position="relative";
  t.style.overflow="hidden";
  const span=document.createElement("span");span.className="ripple";
  const size=Math.max(r.width,r.height);span.style.width=span.style.height=size+"px";
  span.style.left=(e.clientX-r.left-size/2)+"px";span.style.top=(e.clientY-r.top-size/2)+"px";
  t.appendChild(span);setTimeout(()=>span.remove(),560);
},true);

function migrateAccounts(){
  if(!Array.isArray(state.accounts))state.accounts=[];
  const needNew=!state.accounts.length||state.accounts.some(a=>!a.bank);
  if(needNew){
    const old={};state.accounts.forEach(a=>{old[a.id]=a.balance||0;});
    const jAib=old.j_aib!=null?old.j_aib:(old.aib!=null?old.aib:0);
    const jRev=old.j_rev!=null?old.j_rev:(old.revolut!=null?old.revolut:0);
    const bAib=old.b_aib!=null?old.b_aib:778.81, bRev=old.b_rev!=null?old.b_rev:341.80;
    state.accounts=[
      {id:"j_aib",owner:"Justin (Chaa)",bank:"AIB",name:"Justin · AIB",balance:jAib},
      {id:"j_rev",owner:"Justin (Chaa)",bank:"Revolut",name:"Justin · Revolut",balance:jRev},
      {id:"b_aib",owner:"Boba",bank:"AIB",name:"Boba · AIB",balance:bAib},
      {id:"b_rev",owner:"Boba",bank:"Revolut",name:"Boba · Revolut",balance:bRev},
    ];
    const map={aib:"j_aib",revolut:"j_rev"};
    Object.values(state.months||{}).forEach(m=>m.tx.forEach(t=>{if(t.account&&map[t.account])t.account=map[t.account];}));
  }
  if(!state.baseline){state.baseline={};state.accounts.forEach(a=>{state.baseline[a.id]=(a.balance!=null?a.balance:0);});
    if(!state.baseline.b_aib)state.baseline.b_aib=778.81; if(!state.baseline.b_rev)state.baseline.b_rev=341.80;}
}

function normalize(s){
  state=s;
  if(!state.ui)state.ui={theme:"light"};
  if(!state.shopping)state.shopping=[];
  if(!state.loans)state.loans=[];
  if(!state.months)state.months={};
  migrateAccounts();
  migrateToManualBalances();
  return state;
}
function setSync(mode){
  const p=document.getElementById("syncPill"),t=document.getElementById("syncTxt");if(!p)return;
  p.classList.remove("ok","saving","off");
  if(!FB_ON){t.textContent="Local";return;}
  if(mode==="saving"){p.classList.add("saving");t.textContent="Saving…";}
  else if(mode==="off"){p.classList.add("off");t.textContent="Offline";}
  else{p.classList.add("ok");t.textContent="Live";}
}
function firstBoot(){
  applyTheme();
  if(state.months["2026-05"])view=new Date(2026,4,1);
  render();fbBooted=true;
}
async function localBoot(){
  const saved=await load();
  if(saved&&saved.config&&saved.months)normalize(saved);else normalize(buildSeed());
  await save();
  firstBoot();
}
let cloudStarted=false;
function startCloudSync(){
  if(cloudStarted)return;cloudStarted=true;
  const db=firebase.database();
  fbRef=db.ref("households/"+ROOM);
  db.ref(".info/connected").on("value",s=>{if(fbBooted)setSync(s.val()?"ok":"off");});
  fbRef.on("value",async snap=>{
    const remote=snap.val();
    const j=remote?JSON.stringify(remote):"";
    if(remote&&remote.config&&remote.months){
      if(j===lastPush){if(!fbBooted){normalize(remote);firstBoot();}setSync("ok");return;}
      if(overlay.classList.contains("open")){pendingRemote=remote;setSync("ok");return;}
      normalize(remote);
      if(!fbBooted)firstBoot();else{applyTheme();render();}
      setSync("ok");
    }else{
      const local=await load();
      normalize((local&&local.config&&local.months)?local:buildSeed());
      if(!fbBooted)firstBoot();
      cloudSave();
    }
  },err=>{console.warn("Firebase:",err&&err.message);if(!fbBooted)localBoot();});
}
function showLogin(show){const g=document.getElementById("loginGate");if(g)g.style.display=show?"flex":"none";const so=document.getElementById("signoutBtn");if(so)so.style.display=show?"none":"inline-flex";}
function friendlyAuthErr(e){const c=(e&&e.code)||"";
  if(c.indexOf("wrong-password")>=0||c.indexOf("invalid-credential")>=0||c.indexOf("invalid-login")>=0)return "Wrong email or password.";
  if(c.indexOf("user-not-found")>=0)return "No account with that email.";
  if(c.indexOf("invalid-email")>=0)return "That doesn't look like a valid email.";
  if(c.indexOf("too-many-requests")>=0)return "Too many attempts — wait a minute and try again.";
  if(c.indexOf("network")>=0)return "Network problem — check your connection.";
  return "Couldn't sign in. "+((e&&e.message)||"");}
function wireLogin(auth){
  const btn=document.getElementById("lgBtn"),em=document.getElementById("lgEmail"),pw=document.getElementById("lgPass"),er=document.getElementById("lgErr"),so=document.getElementById("signoutBtn");
  if(btn){
    const attempt=()=>{er.textContent="";btn.disabled=true;btn.textContent="Signing in…";
      auth.signInWithEmailAndPassword((em.value||"").trim(),pw.value||"").catch(e=>{er.textContent=friendlyAuthErr(e);}).finally(()=>{btn.disabled=false;btn.textContent="Sign in";});};
    btn.onclick=attempt;
    pw.addEventListener("keydown",e=>{if(e.key==="Enter")attempt();});
    em.addEventListener("keydown",e=>{if(e.key==="Enter")pw.focus();});
  }
  if(so)so.onclick=()=>{auth.signOut();};
}
function startApp(){
  if(FB_ON&&typeof firebase!=="undefined"){
    try{
      firebase.initializeApp(FB);
      const auth=firebase.auth();
      auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{});
      wireLogin(auth);
      showLogin(true);
      auth.onAuthStateChanged(user=>{
        if(user){showLogin(false);startCloudSync();}
        else{showLogin(true);}
      });
      return;
    }catch(e){console.warn("Firebase init failed:",e);}
  }
  localBoot();
}
startApp();
 
/* live animated starfield background */
(function(){
  const cv=document.getElementById("bg"); if(!cv)return; const ctx=cv.getContext("2d");
  let W,H,DPR,stars=[],shooters=[];
  const reduced=matchMedia("(prefers-reduced-motion: reduce)").matches;
  function resize(){DPR=Math.min(2,window.devicePixelRatio||1);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+"px";cv.style.height=innerHeight+"px";}
  function mkStar(){return{x:Math.random()*W,y:Math.random()*H,r:(Math.random()*1.4+0.3)*DPR,vy:(Math.random()*0.12+0.03)*DPR,vx:(Math.random()*0.06-0.03)*DPR,ph:Math.random()*6.28,tw:Math.random()*0.025+0.008};}
  function init(){const n=Math.round(Math.min(95,innerWidth*innerHeight/13000));stars=[];for(let i=0;i<n;i++)stars.push(mkStar());}
  const dark=()=>document.documentElement.getAttribute("data-theme")==="dark";
  function step(){
    ctx.clearRect(0,0,W,H); const d=dark();
    for(const s of stars){
      if(!reduced){s.x+=s.vx;s.y-=s.vy;s.ph+=s.tw;}
      if(s.y<-2)s.y=H+2; if(s.x<-2)s.x=W+2; if(s.x>W+2)s.x=-2;
      const a=(d?0.75:0.30)*(0.5+0.5*Math.sin(s.ph));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);
      ctx.fillStyle=d?`rgba(255,248,235,${a})`:`rgba(70,58,46,${a})`;ctx.fill();
    }
    if(!reduced){
      if(d&&Math.random()<0.004&&shooters.length<2)shooters.push({x:Math.random()*W*0.8,y:Math.random()*H*0.35,len:(Math.random()*120+90)*DPR,sp:(Math.random()*5+6)*DPR,life:0});
      for(let i=shooters.length-1;i>=0;i--){const sh=shooters[i];sh.life++;sh.x+=sh.sp;sh.y+=sh.sp*0.5;
        const g=ctx.createLinearGradient(sh.x,sh.y,sh.x-sh.len,sh.y-sh.len*0.5);
        g.addColorStop(0,"rgba(255,250,240,0.85)");g.addColorStop(1,"rgba(255,250,240,0)");
        ctx.strokeStyle=g;ctx.lineWidth=1.6*DPR;ctx.beginPath();ctx.moveTo(sh.x,sh.y);ctx.lineTo(sh.x-sh.len,sh.y-sh.len*0.5);ctx.stroke();
        if(sh.x>W+sh.len||sh.life>140)shooters.splice(i,1);}
    }
    if(!reduced)requestAnimationFrame(step);
  }
  addEventListener("resize",()=>{resize();init();});
  resize();init();step();
})();
</script>
